<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#15803d;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    
    <!-- Decorative elements -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="150" cy="100" r="80" fill="rgba(255,255,255,0.1)" opacity="0.3"/>
  <circle cx="650" cy="500" r="60" fill="rgba(255,255,255,0.1)" opacity="0.3"/>
  <circle cx="700" cy="150" r="40" fill="rgba(255,255,255,0.1)" opacity="0.3"/>
  
  <!-- Leaf decorations -->
  <path d="M100 200 Q120 180 140 200 Q120 220 100 200" fill="rgba(255,255,255,0.2)"/>
  <path d="M660 400 Q680 380 700 400 Q680 420 660 400" fill="rgba(255,255,255,0.2)"/>
  
  <!-- Main quote text -->
  <text x="400" y="250" text-anchor="middle" fill="white" font-family="serif" font-size="38" font-weight="bold" filter="url(#glow)">
    "A wise man should consider
  </text>
  <text x="400" y="300" text-anchor="middle" fill="white" font-family="serif" font-size="38" font-weight="bold" filter="url(#glow)">
    that health is the greatest
  </text>
  <text x="400" y="350" text-anchor="middle" fill="white" font-family="serif" font-size="38" font-weight="bold" filter="url(#glow)">
    of human blessings"
  </text>
  
  <!-- Attribution -->
  <text x="400" y="420" text-anchor="middle" fill="url(#textGradient)" font-family="serif" font-size="24" font-style="italic">
    - Hippocrates
  </text>
  <text x="400" y="450" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="sans-serif" font-size="16">
    Father of Medicine (460-370 BC)
  </text>
  
  <!-- Decorative border -->
  <rect x="10" y="10" width="780" height="580" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" rx="20"/>
  
  <!-- Heart symbol -->
  <path d="M400 480 C400 470, 390 460, 380 460 C370 460, 360 470, 360 480 C360 490, 380 510, 400 520 C420 510, 440 490, 440 480 C440 470, 430 460, 420 460 C410 460, 400 470, 400 480 Z" 
        fill="url(#textGradient)" opacity="0.8"/>
</svg>